name: Bug Report
description: Report an issue with the Coffer app
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue with Coffer! Please fill out the details below so we can help.

  - type: textarea
    id: description
    attributes:
      label: Describe the issue
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - macOS
        - watchOS
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      description: You can find this in the app's settings/about screen.
      placeholder: e.g. 1.4.2
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Device / OS version
      placeholder: e.g. iPhone 14, iOS 17.5
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Screenshots or logs
      description: If applicable, add screenshots or logs to help explain the problem.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else we should know?
    validations:
      required: false
